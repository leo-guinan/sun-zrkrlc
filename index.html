<!doctype html><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Solar Museum</title><style>body{margin:0;background:#070706;color:#f4f1e8;font-family:ui-monospace,Menlo,monospace}main{max-width:1100px;margin:0 auto;padding:28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{border:1px solid #333;background:#131310;border-radius:16px;padding:16px}a{color:#93c5fd}.muted{color:#aaa}h1{font-size:42px;letter-spacing:-.05em}.pill{display:inline-block;padding:3px 8px;border:1px solid #555;border-radius:999px;margin:2px}</style><main><h1 id='title'>Solar Museum</h1><p class='muted' id='sub'></p><div id='stats'></div><section class='grid' id='planets'></section></main><script>fetch('sun.json').then(r=>r.json()).then(s=>{title.textContent=s.museum_copy.title;sub.textContent=s.museum_copy.warning;stats.innerHTML=`<p>${s.sun.document_count} docs · ${s.sun.word_count} words · ${s.sun.active_days} active days</p>`;planets.innerHTML=s.planets.map(p=>`<div class=card><h2>${p.name}</h2><p>${p.summary}</p><p>${p.top_terms.map(t=>`<span class=pill>${t}</span>`).join('')}</p>${p.artifacts.map(a=>`<blockquote>“${a.excerpt.slice(0,280)}${a.excerpt.length>280?'…':''}”</blockquote><p class=muted>${a.timestamp||''} ${a.url?`· <a href='${a.url}'>source</a>`:''}</p>`).join('')}</div>`).join('')})</script>
